name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Package release
        run: |
          mkdir -p dist/mailim
          cp -r server/ dist/mailim/
          cp -r client/dist/ dist/mailim/client/
          cp package.json package-lock.json dist/mailim/
          cp .env.example dist/mailim/
          tar -czf mailim-${{ github.ref_name }}.tar.gz -C dist mailim

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: mailim-${{ github.ref_name }}.tar.gz
